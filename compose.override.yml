x-airflow-common-dev: &airflow-common-dev
  build:
    context: .
    dockerfile: infra/airflow/Dockerfile
    target: ${ENV:-dev}

x-dbt-common-dev: &dbt-common-dev
  build:
    context: .
    dockerfile: infra/dbt/Dockerfile

x-airflow-volumes: &airflow-volumes
  volumes:
    - ${AIRFLOW_PROJ_DIR:-.}/airflow/tests:/opt/airflow/tests
    - ${AIRFLOW_PROJ_DIR:-.}/pytest.ini:/opt/airflow/pytest.ini

services:
  airflow-apiserver:
    <<: [*airflow-common-dev, *airflow-volumes]

  airflow-scheduler:
    <<: *airflow-common-dev

  airflow-dag-processor:
    <<: *airflow-common-dev

  airflow-worker:
    <<: *airflow-common-dev

  airflow-triggerer:
    <<: *airflow-common-dev

  airflow-init:
    <<: *airflow-common-dev

  airflow-cli:
    <<: [*airflow-common-dev, *airflow-volumes]

  flower:
    <<: *airflow-common-dev

  dbt-init:
    <<: *dbt-common-dev
    working_dir: /opt/dbt
    environment:
      DBT_PROJECT_NAME: dbt
      DBT_PROFILES_DIR: /opt/dbt
      DBT_POSTGRES_HOST: ${POSTGRES_HOST}
      DBT_POSTGRES_DBNAME: ${POSTGRES_DB}
      DBT_POSTGRES_USER: ${POSTGRES_USER}
      DBT_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DBT_POSTGRES_PORT: ${POSTGRES_PORT}
      DBT_POSTGRES_SCHEMA: ${POSTGRES_SCHEMA}
      DBT_THREADS: ${DBT_THREADS}
    volumes:
      - ${AIRFLOW_PROJ_DIR:-.}/dbt:/opt/dbt
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        if [ ! -f "/opt/dbt/dbt_project.yml" ]; then
          echo "Initializing dbt project in /opt/dbt with project name: $${DBT_PROJECT_NAME}"
          rm -rf /tmp/dbt-init
          mkdir -p /tmp/dbt-init
          cd /tmp/dbt-init
          dbt init --project-name "$${DBT_PROJECT_NAME}" --skip-profile-setup
          shopt -s dotglob
          mv "/tmp/dbt-init/$${DBT_PROJECT_NAME}"/* /opt/dbt/
        else
          echo "dbt project already exists at /opt/dbt"
        fi
        if [ ! -f /opt/dbt/profiles.yml ]; then
          echo "Creating env-driven /opt/dbt/profiles.yml"
          printf '%s\n' \
            'dbt:' \
            '  target: default' \
            '  outputs:' \
            '    default:' \
            '      type: postgres' \
            '      host: "{{ env_var('"'"'DBT_POSTGRES_HOST'"'"') }}"' \
            '      port: "{{ env_var('"'"'DBT_POSTGRES_PORT'"'"') | int }}"' \
            '      user: "{{ env_var('"'"'DBT_POSTGRES_USER'"'"') }}"' \
            '      password: "{{ env_var('"'"'DBT_POSTGRES_PASSWORD'"'"') }}"' \
            '      dbname: "{{ env_var('"'"'DBT_POSTGRES_DBNAME'"'"') }}"' \
            '      schema: "{{ env_var('"'"'DBT_POSTGRES_SCHEMA'"'"') }}"' \
            '      threads: "{{ env_var('"'"'DBT_THREADS'"'"', '"'"'4'"'"') | int }}"' \
            > /opt/dbt/profiles.yml
        else
          echo "/opt/dbt/profiles.yml already exists"
        fi
    restart: "no"
    networks:
      - airflow-net

  dbt:
    <<: *dbt-common-dev
    working_dir: /opt/dbt
    environment:
      DBT_PROJECT_NAME: dbt
      DBT_PROFILES_DIR: /opt/dbt
      DBT_POSTGRES_HOST: ${POSTGRES_HOST}
      DBT_POSTGRES_DBNAME: ${POSTGRES_DB}
      DBT_POSTGRES_USER: ${POSTGRES_USER}
      DBT_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DBT_POSTGRES_PORT: ${POSTGRES_PORT}
      DBT_POSTGRES_SCHEMA: ${DBT_POSTGRES_SCHEMA}
      DBT_THREADS: ${DBT_THREADS}
    volumes:
      - ${AIRFLOW_PROJ_DIR:-.}/dbt:/opt/dbt
    depends_on:
      app-postgres:
        condition: service_healthy
      dbt-init:
        condition: service_completed_successfully
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        dbt debug --project-dir /opt/dbt --profiles-dir /opt/dbt
        tail -f /dev/null
    healthcheck:
      test: ["CMD-SHELL", "dbt --version >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - airflow-net
