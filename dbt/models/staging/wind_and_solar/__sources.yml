sources:
  - name: elexon
    schema: "{{ env_var('DBT_POSTGRES_SCHEMA', 'public') }}"
    tables:
      - name: bmrs_datasets
        description: Raw bmrs datasets from ELEXON table populated by the Airflow pipeline.
        config:
          freshness:
            warn_after: {count: 3, period: hour}
            error_after: {count: 6, period: hour}
          loaded_at_field: ingestion_ts
